<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }


        .base{
            width: 200px; /* Largura do retângulo */
            height: 470px;
            background-color: rgb(28, 28, 31); /* Cor do retângulo */
            padding: 20px;
            margin: 20px auto;

        }


        .luz-vermelha{
            background-color: rgb(206, 34, 34); 
            border-radius: 50%;
            width: 140px; /* Largura do retângulo */
            height: 140px; /* Altura do retângulo */
            border: solid 3px rgb(78, 78, 78);
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .luz-amarelo{
            background-color: rgb(220, 186, 51); 
            border-radius: 50%;
            width: 140px; /* Largura do retângulo */
            height: 140px; /* Altura do retângulo */
            border: solid 3px rgb(78, 78, 78);
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .luz-verde{
            background-color: rgb(55, 145, 48); 
            border-radius: 50%;
            width: 140px; /* Largura do retângulo */
            height: 140px; /* Altura do retângulo */
            border: solid 3px rgb(78, 78, 78);
            box-sizing: border-box;
            margin-bottom: 15px;
        }

    </style>

<body>

    <div class="base">
         <div class="luz-vermelha">
        </div>

        <div class="luz-amarelo">
        </div>

        <div class="luz-verde">
        </div>

    </div>
    
    
</body>
</html>
